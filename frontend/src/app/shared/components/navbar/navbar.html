<nav
  class="fixed left-3 right-3 top-3 z-50 rounded-2xl border border-white/10 bg-[#11100D] text-white shadow-lg lg:left-1/2 lg:right-auto lg:w-[calc(100vw-3rem)] lg:max-w-[1180px] lg:-translate-x-1/2"
>
  <div class="flex h-16 items-center gap-4 px-4">

    <!-- Logo -->
    <a routerLink="/" class="flex items-center gap-2">
      <img src="branding/logo.svg" alt="Logo de Bame" class="h-10 w-auto object-contain" />
    </a>

    <!-- Links desktop -->
    <ul class="ml-8 hidden items-center gap-1 md:flex">
      <li>
        <a
          routerLink="/home"
          routerLinkActive="bg-[#241F16] text-white"
          [routerLinkActiveOptions]="{ exact: true }"
          class="rounded-full px-4 py-2 text-sm font-bold text-stone-400 transition hover:bg-[#241F16] hover:text-white"
        >{{ t().nav.inicio }}</a>
      </li>
      <li>
        <a
          routerLink="/home/carta"
          routerLinkActive="bg-[#241F16] text-white"
          class="rounded-full px-4 py-2 text-sm font-bold text-stone-400 transition hover:bg-[#241F16] hover:text-white"
        >{{ t().nav.menu }}</a>
      </li>
      <li>
        <a
          routerLink="/home/locales"
          routerLinkActive="bg-[#241F16] text-white"
          class="rounded-full px-4 py-2 text-sm font-bold text-stone-400 transition hover:bg-[#241F16] hover:text-white"
        >{{ t().nav.locales }}</a>
      </li>
      <li>
        <a
          routerLink="/home/contacto"
          routerLinkActive="bg-[#241F16] text-white"
          class="rounded-full px-4 py-2 text-sm font-bold text-stone-400 transition hover:bg-[#241F16] hover:text-white"
        >{{ t().nav.contacto }}</a>
      </li>
    </ul>

    <div class="flex-1"></div>

    <!-- Accesibilidad -->
    <div class="rounded-full border border-white/10 bg-[#241F16] transition hover:border-white/20">
      <app-accessibility-menu />
    </div>

    <!-- Tema -->
    <!-- Tema -->
<button
  type="button"
  (click)="toggleTheme()"
  class="hidden items-center gap-2 rounded-full border border-white/10 bg-[#241F16] px-4 py-2.5 text-sm font-bold text-white transition hover:border-white/20 sm:inline-flex"
  [attr.aria-label]="userPref.effectiveTheme() === 'dark' ? t().accessibility.themeLight : t().accessibility.themeDark"
>
  @if (userPref.effectiveTheme() === 'dark') {
    <!-- Sol -->
    <svg
      xmlns="http://www.w3.org/2000/svg"
      class="size-5 text-yellow-400"
      viewBox="0 0 24 24"
      fill="none"
      stroke="currentColor"
      stroke-width="2"
      stroke-linecap="round"
      stroke-linejoin="round"
    >
      <path d="M12 4V2" />
      <path d="M12 22v-2" />
      <path d="m4.93 4.93 1.41 1.41" />
      <path d="m17.66 17.66 1.41 1.41" />
      <path d="M2 12h2" />
      <path d="M20 12h2" />
      <path d="m6.34 17.66-1.41 1.41" />
      <path d="m19.07 4.93-1.41 1.41" />
      <circle cx="12" cy="12" r="4" />
    </svg>
  } @else {
    <!-- Luna -->
    <svg
      xmlns="http://www.w3.org/2000/svg"
      class="size-5 text-yellow-300"
      viewBox="0 0 24 24"
      fill="none"
      stroke="currentColor"
      stroke-width="2"
      stroke-linecap="round"
      stroke-linejoin="round"
    >
      <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z" />
    </svg>
  }

  {{ userPref.effectiveTheme() === 'dark' ? t().accessibility.modeLight : t().accessibility.modeDark }}
</button>

    <!-- Botón usuario con dropdown -->
    <app-user-menu />

    <!-- Botón menú móvil -->
    <button
      type="button"
      (click)="toggleMenu()"
      class="rounded-xl p-2 text-white transition hover:bg-white/10 md:hidden"
      [attr.aria-expanded]="isMenuOpen"
      aria-controls="dropdown-menu"
      aria-label="Alternar menú de navegación"
    >
      <tabler-icon [icon]="isMenuOpen ? 'x' : 'menu-2'" [size]="26" />
    </button>

  </div>

  <!-- Menú móvil desplegable -->
  @if (isMenuOpen) {
    <div
      id="dropdown-menu"
      class="border-t border-white/10 px-4 py-4 md:hidden"
      cdkTrapFocus
      cdkTrapFocusAutoCapture
      (keydown)="onMenuKeydown($event)"
    >
      <ul class="flex flex-col gap-2">
        @switch (navRole()) {
          @case ('admin') {
            <app-nav-admin-links (closeMenu)="closeMenu()" />
          }
          @case ('manager') {
            <app-nav-manager-links [localId]="auth.currentLocalId()" (closeMenu)="closeMenu()" />
          }
          @case ('responsable') {
            <app-nav-responsable-links [localId]="auth.currentLocalId()" (closeMenu)="closeMenu()" />
          }
          @case ('store') {
            <app-nav-store-links [localId]="auth.currentLocalId()" (closeMenu)="closeMenu()" />
          }
          @default {
            <app-nav-user-links (closeMenu)="closeMenu()" />
          }
        }
      </ul>

      <!-- Tema claro/oscuro en móvil -->
      <div class="mt-3 border-t border-white/10 pt-3">
        <button
          type="button"
          (click)="toggleTheme()"
          class="flex w-full items-center gap-3 rounded-xl px-3 py-2.5 text-sm font-bold text-white/80 transition hover:bg-white/10"
          [attr.aria-label]="userPref.effectiveTheme() === 'dark' ? t().accessibility.themeLight : t().accessibility.themeDark"
        >
          @if (userPref.effectiveTheme() === 'dark') {
            <tabler-icon icon="sun" [size]="20" class="text-yellow-400" />
            {{ t().accessibility.modeLight }}
          } @else {
            <tabler-icon icon="moon" [size]="20" class="text-yellow-300" />
            {{ t().accessibility.modeDark }}
          }
        </button>
      </div>
    </div>
  }

</nav>

@if (isMenuOpen) {
  <div class="fixed inset-0 z-40 md:hidden" (click)="closeMenu()" aria-hidden="true"></div>
}
